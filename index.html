<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gurulós golyók</title>
<style>
  :root {
    --board: 92vmin;
    --cols: 10;
    --cell: calc(var(--board) / var(--cols));
    --gap: calc(var(--cell) * 0.08);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: #12151c;
    color: #e8ecf3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }
  #app {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.4vmin;
  }
  #hud {
    display: flex;
    gap: 6vmin;
    align-items: baseline;
    font-variant-numeric: tabular-nums;
  }
  #hud .label { font-size: 2.6vmin; color: #8b93a7; letter-spacing: .5px; }
  #hud .val { font-size: 4.4vmin; font-weight: 700; }
  #boardWrap {
    position: relative;
    width: var(--board);
    height: var(--board);
    background: #1c2130;
    border-radius: calc(var(--cell) * 0.18);
    box-shadow: inset 0 0 0 2px #2a3145, 0 10px 30px rgba(0,0,0,.4);
    overflow: hidden;
    transition: transform .18s ease;
  }
  #board { position: absolute; inset: 0; }
  .ball {
    position: absolute;
    width: calc(var(--cell) - var(--gap) * 2);
    height: calc(var(--cell) - var(--gap) * 2);
    border-radius: 50%;
    transform: translate(0,0);
    transition: transform .09s linear, opacity .18s ease;
    will-change: transform;
  }
  .ball.pop { transform: translate(var(--x), var(--y)) scale(1.6) !important; opacity: 0; }
  .c0 { background: radial-gradient(circle at 32% 30%, #ff8a8a, #e23b3b); }
  .c1 { background: radial-gradient(circle at 32% 30%, #8ab6ff, #2f6fe0); }
  .c2 { background: radial-gradient(circle at 32% 30%, #9df0a8, #2fb84a); }
  .c3 { background: radial-gradient(circle at 32% 30%, #ffe27a, #e0a800); }
  .c4 { background: radial-gradient(circle at 32% 30%, #d7a6ff, #9b45e0); }
  #controls {
    display: flex;
    gap: 3vmin;
    width: var(--board);
  }
  .btn {
    flex: 1;
    padding: 2.4vmin 0;
    font-size: 4vmin;
    font-weight: 700;
    background: #2a3145;
    color: #e8ecf3;
    border: none;
    border-radius: 2vmin;
    cursor: pointer;
    transition: background .1s;
  }
  .btn:active, .btn.held { background: #3d63c9; }
  #overlay {
    position: fixed; inset: 0;
    background: rgba(10,12,18,.86);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3vmin; text-align: center; z-index: 10;
    padding: 6vmin;
  }
  #overlay.hidden { display: none; }
  #overlay h1 { font-size: 7vmin; margin: 0; }
  #overlay p { font-size: 3.4vmin; color: #b7bfd0; margin: 0; max-width: 80vmin; line-height: 1.4; }
  #startBtn {
    margin-top: 2vmin;
    padding: 3vmin 8vmin;
    font-size: 4.6vmin;
    font-weight: 700;
    background: #3d63c9;
    color: #fff; border: none;
    border-radius: 3vmin; cursor: pointer;
  }
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div><span class="label">PONT</span> <span class="val" id="score">0</span></div>
    <div><span class="label">DŐLÉS</span> <span class="val" id="tiltInd">•</span></div>
  </div>
  <div id="boardWrap"><div id="board"></div></div>
  <div id="controls">
    <button class="btn" id="leftBtn">◀ Balra</button>
    <button class="btn" id="rightBtn">Jobbra ▶</button>
  </div>
</div>

<div id="overlay">
  <h1>Gurulós golyók</h1>
  <p>Döntsd a telefont balra vagy jobbra — a golyók abba az irányba gurulnak és leesnek. 3+ egyforma összeérő golyó eltűnik.</p>
  <p style="font-size:2.8vmin;color:#8b93a7">Asztalon: ← → billentyűk vagy a gombok.</p>
  <button id="startBtn">Indítás</button>
</div>

<script>
// ===== Beállítások (könnyen hangolható) =====
const ROWS = 10, COLS = 10;
const NCOLORS = 5;
const STEP_MS = 85;        // egy fizikai mikro-lépés ideje (kisebb = gyorsabb gurulás)
const SPAWN_MS = 3800;     // milyen gyakran essen be új golyó felülről
const INITIAL_BALLS = 34;  // hány golyóval induljon
const MATCH_MIN = 3;       // ennyi összeérő azonos szín tűnik el
const TILT_DEG = 7;        // ekkora dőlés (fok) felett vált a gravitáció oldalra
// ============================================

const boardEl = document.getElementById('board');
const wrapEl = document.getElementById('boardWrap');
const scoreEl = document.getElementById('score');
const tiltIndEl = document.getElementById('tiltInd');
const overlay = document.getElementById('overlay');

let grid = [];             // grid[r][c] = ball id vagy null
let balls = new Map();     // id -> { color, el }
let nextId = 1;
let score = 0;
let running = false;
let combo = 0;
let wasMoving = false;

// gravitáció vízszintes komponense: -1 (bal), 0, +1 (jobb)
let keyDx = 0, btnDx = 0, tiltDx = 0;
function currentDx() {
  if (keyDx !== 0) return keyDx;
  if (btnDx !== 0) return btnDx;
  return tiltDx;
}

function emptyGrid() {
  grid = Array.from({length: ROWS}, () => Array(COLS).fill(null));
}

function addBall(r, c, color) {
  const id = nextId++;
  const el = document.createElement('div');
  el.className = 'ball c' + color;
  boardEl.appendChild(el);
  balls.set(id, { color, el });
  grid[r][c] = id;
  return id;
}

function cellPx() {
  return wrapEl.clientWidth / COLS;
}

function render() {
  const cell = cellPx();
  const gap = cell * 0.08;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const id = grid[r][c];
      if (!id) continue;
      const b = balls.get(id);
      const x = c * cell + gap;
      const y = r * cell + gap;
      b.el.style.transform = `translate(${x}px, ${y}px)`;
    }
  }
}

// Egy mikro-lépés: minden golyó max 1 cellát mozdul a gravitáció szerint.
// Elsőbbség: le > átlósan-le a dőlés felé > oldalra a dőlés felé.
function stepGravity(dx) {
  let moved = false;
  for (let r = ROWS - 2; r >= 0; r--) {
    const cols = [];
    if (dx > 0) { for (let c = COLS - 1; c >= 0; c--) cols.push(c); }
    else { for (let c = 0; c < COLS; c++) cols.push(c); }
    for (const c of cols) {
      const id = grid[r][c];
      if (!id) continue;
      const targets = [[r + 1, c]];
      if (dx !== 0) {
        targets.push([r + 1, c + dx]);
        targets.push([r, c + dx]);
      }
      for (const [nr, nc] of targets) {
        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !grid[nr][nc]) {
          grid[nr][nc] = id;
          grid[r][c] = null;
          moved = true;
          break;
        }
      }
    }
  }
  return moved;
}

// Összefüggő (4-szomszéd) azonos színű csoportok >= MATCH_MIN eltávolítása.
function checkMatches() {
  const seen = Array.from({length: ROWS}, () => Array(COLS).fill(false));
  const toRemove = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (seen[r][c] || !grid[r][c]) continue;
      const color = balls.get(grid[r][c]).color;
      const group = [];
      const stack = [[r, c]];
      seen[r][c] = true;
      while (stack.length) {
        const [cr, cc] = stack.pop();
        group.push([cr, cc]);
        for (const [dr, dc] of [[1,0],[-1,0],[0,1],[0,-1]]) {
          const nr = cr + dr, nc = cc + dc;
          if (nr>=0&&nr<ROWS&&nc>=0&&nc<COLS && !seen[nr][nc] && grid[nr][nc]
              && balls.get(grid[nr][nc]).color === color) {
            seen[nr][nc] = true;
            stack.push([nr, nc]);
          }
        }
      }
      if (group.length >= MATCH_MIN) toRemove.push(group);
    }
  }
  if (toRemove.length === 0) { combo = 0; return 0; }

  combo++;
  let removedCount = 0;
  for (const group of toRemove) {
    const pts = 20 * Math.pow(2, group.length - 3); // 3→20, 4→40, 5→80...
    score += Math.round(pts) * combo;
    for (const [gr, gc] of group) {
      const id = grid[gr][gc];
      const b = balls.get(id);
      b.el.style.setProperty('--x', b.el.style.transform.match(/translate\(([^,]+),/)?.[1] || '0px');
      b.el.classList.add('pop');
      const el = b.el;
      setTimeout(() => el.remove(), 200);
      balls.delete(id);
      grid[gr][gc] = null;
      removedCount++;
    }
  }
  scoreEl.textContent = score;
  beep(520 + combo * 120, 0.12);
  return removedCount;
}

function boardFull() {
  for (let c = 0; c < COLS; c++) if (!grid[0][c]) return false;
  return true;
}

// ===== Fő ciklus =====
let loopTimer = null, spawnTimer = null;

function tick() {
  if (!running) return;
  const dx = currentDx();
  tiltIndEl.textContent = dx < 0 ? '◀' : dx > 0 ? '▶' : '•';
  const moved = stepGravity(dx);
  if (moved) {
    if (!wasMoving) { beep(200, 0.04, 0.05); wasMoving = true; }
    render();
  } else {
    wasMoving = false;
    const removed = checkMatches();
    if (removed > 0) {
      render();
    } else {
      if (boardFull()) { gameOver(); return; }
    }
  }
}

function spawnTick() {
  if (!running) return;
  // dőlés irányával ellentétes / felső üres cellába pottyan új golyó
  const freeTop = [];
  for (let c = 0; c < COLS; c++) if (!grid[0][c]) freeTop.push(c);
  if (freeTop.length === 0) return;
  const c = freeTop[Math.floor(Math.random() * freeTop.length)];
  addBall(0, c, Math.floor(Math.random() * NCOLORS));
  render();
}

function startGame() {
  emptyGrid();
  balls.forEach(b => b.el.remove());
  balls.clear();
  score = 0; combo = 0; wasMoving = false;
  scoreEl.textContent = '0';

  // Kezdő szórás: véletlen üres cellákba golyók, majd leesnek.
  const cells = [];
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) cells.push([r, c]);
  for (let i = cells.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cells[i], cells[j]] = [cells[j], cells[i]];
  }
  for (let i = 0; i < INITIAL_BALLS; i++) {
    const [r, c] = cells[i];
    addBall(r, c, Math.floor(Math.random() * NCOLORS));
  }
  render();

  running = true;
  overlay.classList.add('hidden');
  clearInterval(loopTimer); clearInterval(spawnTimer);
  loopTimer = setInterval(tick, STEP_MS);
  spawnTimer = setInterval(spawnTick, SPAWN_MS);
}

function gameOver() {
  running = false;
  clearInterval(loopTimer); clearInterval(spawnTimer);
  beep(160, 0.5, 0.2);
  overlay.querySelector('h1').textContent = 'Vége!';
  overlay.querySelector('p').textContent = 'Pontszám: ' + score;
  overlay.querySelector('#startBtn').textContent = 'Újra';
  overlay.classList.remove('hidden');
}

// ===== Hang =====
let audioCtx = null;
function beep(freq, dur, vol = 0.08) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.value = freq;
    o.type = 'sine';
    g.gain.value = vol;
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    o.stop(audioCtx.currentTime + dur);
  } catch (e) {}
}

// ===== Vezérlés =====
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') keyDx = -1;
  else if (e.key === 'ArrowRight') keyDx = 1;
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft' && keyDx === -1) keyDx = 0;
  else if (e.key === 'ArrowRight' && keyDx === 1) keyDx = 0;
});

function holdBtn(el, dir) {
  const down = e => { e.preventDefault(); btnDx = dir; el.classList.add('held'); };
  const up = e => { e.preventDefault(); if (btnDx === dir) btnDx = 0; el.classList.remove('held'); };
  el.addEventListener('pointerdown', down);
  el.addEventListener('pointerup', up);
  el.addEventListener('pointercancel', up);
  el.addEventListener('pointerleave', up);
}
holdBtn(document.getElementById('leftBtn'), -1);
holdBtn(document.getElementById('rightBtn'), 1);

function onTilt(e) {
  const g = e.gamma; // bal-jobb dőlés fokban
  if (g == null) return;
  if (g > TILT_DEG) tiltDx = 1;
  else if (g < -TILT_DEG) tiltDx = -1;
  else tiltDx = 0;
}

document.getElementById('startBtn').addEventListener('click', async () => {
  // iOS: dőlés-engedély kérése felhasználói gesztusra
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const res = await DeviceOrientationEvent.requestPermission();
      if (res === 'granted') window.addEventListener('deviceorientation', onTilt);
    } catch (e) {}
  } else {
    window.addEventListener('deviceorientation', onTilt);
  }
  startGame();
});

window.addEventListener('resize', () => { if (running) render(); });
</script>
</body>
</html>
